map $http_upgrade $connection_upgrade {
    default "upgrade";
}

upstream backend {
    server www.example.com:80;
    keepalive 256;
}

server {
    listen       80 default_server;
    server_name  _;

    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    #access_log  /var/log/nginx/host.access.log  main;

    # Cookie domain.
    set $lua_auth_domain "www.example.com";
    # Cookie expiration in seconds.
    set $lua_auth_expires_after 604800;
    # Cookie auth secret.
    set $lua_auth_secret "TopSecretHMACKeyIs12345";

    access_by_lua_file /etc/nginx/cookie_auth.lua;

    location / {
        # root   /usr/share/nginx/html;

        proxy_pass            http://backend;
        proxy_http_version    1.1;

        proxy_set_header    Connection             $connection_upgrade;
        proxy_set_header    Upgrade                $http_upgrade;
        proxy_set_header    Host                   $host;
        proxy_set_header    X-Real-IP              $remote_addr;
        proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
    }
}
